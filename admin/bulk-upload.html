<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>رفع مشاريع جماعي — Creative3Design</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/config.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0a0a0a; color: #e0d5c5; min-height: 100vh; padding: 20px; }
  h1 { color: #B8976A; text-align: center; margin-bottom: 6px; font-size: 1.8rem; }
  .subtitle { text-align: center; color: #888; margin-bottom: 30px; font-size: 0.9rem; }
  #dropZone { border: 2px dashed #B8976A55; border-radius: 16px; padding: 50px 20px; text-align: center; cursor: pointer; transition: all 0.3s; background: #111; margin-bottom: 30px; }
  #dropZone:hover, #dropZone.drag-over { border-color: #B8976A; background: #1a1500; }
  #dropZone .icon { font-size: 3rem; margin-bottom: 12px; }
  #dropZone p { color: #aaa; }
  #dropZone strong { color: #B8976A; }
  #fileInput { display: none; }
  #projectsGrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 20px; margin-bottom: 30px; }
  .project-card { background: #161616; border-radius: 12px; overflow: hidden; border: 1px solid #2a2a2a; transition: border-color 0.3s; }
  .project-card.uploading { border-color: #B8976A55; }
  .project-card.success { border-color: #4caf50; }
  .project-card.error { border-color: #f44336; }
  .card-image { position: relative; aspect-ratio: 16/9; overflow: hidden; background: #0d0d0d; }
  .card-image img { width: 100%; height: 100%; object-fit: cover; }
  .card-image .img-badge { position: absolute; bottom: 8px; right: 8px; background: #000000aa; color: #B8976A; font-size: 0.7rem; padding: 3px 8px; border-radius: 20px; }
  .progress-bar { position: absolute; bottom: 0; left: 0; height: 3px; background: #B8976A; width: 0; transition: width 0.4s; }
  .status-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; background: #00000088; opacity: 0; transition: opacity 0.3s; }
  .project-card.uploading .status-overlay, .project-card.success .status-overlay, .project-card.error .status-overlay { opacity: 1; }
  .card-body { padding: 16px; }
  .card-body label { display: block; font-size: 0.72rem; color: #B8976A; margin-bottom: 4px; margin-top: 10px; }
  .card-body label:first-child { margin-top: 0; }
  .card-body input, .card-body select, .card-body textarea { width: 100%; background: #0d0d0d; border: 1px solid #2a2a2a; color: #e0d5c5; padding: 8px 10px; border-radius: 6px; font-size: 0.85rem; font-family: inherit; }
  .card-body input:focus, .card-body select:focus, .card-body textarea:focus { outline: none; border-color: #B8976A55; }
  .card-body textarea { resize: vertical; height: 60px; }
  .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .remove-btn { float: left; background: none; border: none; color: #666; cursor: pointer; font-size: 1.1rem; padding: 2px 6px; border-radius: 4px; margin-top: 10px; }
  .remove-btn:hover { color: #f44336; }
  .actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; margin-bottom: 30px; }
  .btn { padding: 12px 28px; border-radius: 8px; border: none; cursor: pointer; font-size: 0.95rem; font-weight: 600; transition: all 0.2s; }
  .btn-primary { background: #B8976A; color: #000; }
  .btn-primary:hover { background: #d4af7a; }
  .btn-primary:disabled { background: #5a4a35; color: #888; cursor: not-allowed; }
  .btn-secondary { background: #222; color: #aaa; border: 1px solid #333; }
  .btn-secondary:hover { background: #2a2a2a; }
  #log { background: #0d0d0d; border: 1px solid #1e1e1e; border-radius: 8px; padding: 16px; font-family: monospace; font-size: 0.8rem; max-height: 200px; overflow-y: auto; display: none; }
  .log-ok { color: #4caf50; }
  .log-err { color: #f44336; }
  .log-info { color: #B8976A; }
</style>
</head>
<body>
<h1>📁 رفع مشاريع جماعي</h1>
<p class="subtitle">اسحب صورك هنا — ستُضغط تلقائياً وتُرفع إلى Cloudinary وتُضاف إلى الموقع</p>
<div id="dropZone" onclick="document.getElementById('fileInput').click()">
  <div class="icon">🖼️</div>
  <p>اسحب الصور هنا أو <strong>اضغط للاختيار</strong></p>
  <p style="font-size:0.8rem;margin-top:8px;color:#555">JPG · PNG · WebP · HEIC — حتى 20 صورة دفعة واحدة</p>
</div>
<input type="file" id="fileInput" multiple accept="image/*">
<div id="projectsGrid"></div>
<div class="actions" id="actions" style="display:none">
  <button class="btn btn-primary" id="uploadBtn" onclick="uploadAll()">⬆️ رفع الكل وحفظ في الموقع</button>
  <button class="btn btn-secondary" onclick="clearAll()">🗑️ مسح الكل</button>
</div>
<div id="log"></div>
<script>
const CFG = window.C3D_CONFIG;
const CLOUD_NAME = CFG.cloudinary.cloudName;
const UPLOAD_PRESET = CFG.cloudinary.uploadPreset;
const FOLDER = CFG.cloudinary.folder;
const { createClient } = supabase;
const db = createClient(CFG.supabase.url, CFG.supabase.anonKey, { auth: { autoRefreshToken: true, persistSession: true } });
let items = [];
const dropZone = document.getElementById('dropZone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('drag-over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('drag-over'); addFiles([...e.dataTransfer.files]); });
document.getElementById('fileInput').addEventListener('change', e => { addFiles([...e.target.files]); e.target.value = ''; });
async function addFiles(files) {
  const imageFiles = files.filter(f => f.type.startsWith('image/'));
  for (const file of imageFiles) {
    log('info', '🔄 ضغط: ' + file.name + ' (' + formatSize(file.size) + ')');
    const compressed = await compressImage(file, 1920, 0.85);
    const previewUrl = URL.createObjectURL(compressed.blob);
    items.push({ id: Date.now() + Math.random(), file, previewUrl, originalSize: file.size, compressedBlob: compressed.blob, compressedSize: compressed.blob.size, name: file.name.replace(/\.[^.]+$/, '').replace(/[-_]/g, ' ') });
    log('ok', '✅ ' + file.name + ': ' + formatSize(file.size) + ' → ' + formatSize(compressed.blob.size) + ' (WebP)');
  }
  renderGrid();
}
function compressImage(file, maxPx, quality) {
  return new Promise(resolve => {
    const img = new Image();
    img.onload = () => {
      let w = img.width, h = img.height;
      if (w > maxPx || h > maxPx) { if (w >= h) { h = Math.round(h * maxPx / w); w = maxPx; } else { w = Math.round(w * maxPx / h); h = maxPx; } }
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      canvas.toBlob(blob => resolve({ blob, w, h }), 'image/webp', quality);
    };
    img.src = URL.createObjectURL(file);
  });
}
function renderGrid() {
  const grid = document.getElementById('projectsGrid');
  grid.innerHTML = '';
  items.forEach((item, idx) => {
    const saving = Math.round((1 - item.compressedSize / item.originalSize) * 100);
    grid.innerHTML += '<div class="project-card" id="card-' + idx + '"><div class="card-image"><img src="' + item.previewUrl + '" alt=""><div class="img-badge">WebP · ' + formatSize(item.compressedSize) + ' · وفّر ' + saving + '%</div><div class="progress-bar" id="prog-' + idx + '"></div><div class="status-overlay" id="overlay-' + idx + '"></div></div><div class="card-body"><button class="remove-btn" onclick="removeItem(' + idx + ')" title="حذف">✕</button><label>اسم المشروع (عربي) *</label><input type="text" id="name_ar_' + idx + '" value="' + item.name + '" placeholder="مثال: شقة التجمع الفاخرة"><label>اسم المشروع (إنجليزي)</label><input type="text" id="name_en_' + idx + '" placeholder="Luxury Apartment"><div class="row2"><div><label>التصنيف *</label><select id="cat_' + idx + '"><option value="">-- اختر --</option><option value="residential">سكني</option><option value="commercial">تجاري</option><option value="villa">فيلا</option><option value="hospitality">ضيافة</option><option value="office">مكاتب</option></select></div><div><label>الطراز *</label><select id="style_' + idx + '"><option value="">-- اختر --</option><option value="modern">مودرن</option><option value="classic">كلاسيك</option><option value="contemporary">معاصر</option><option value="neoclassic">نيوكلاسيك</option><option value="minimal">مينيمال</option><option value="luxury">فاخر</option></select></div></div><label>الموقع (عربي)</label><input type="text" id="loc_ar_' + idx + '" placeholder="التجمع الخامس، القاهرة"><label>وصف المشروع</label><textarea id="desc_' + idx + '" placeholder="وصف مختصر..."></textarea><div class="row2" style="margin-top:10px"><label style="margin:0;display:flex;align-items:center;gap:6px;color:#888;font-size:0.8rem"><input type="checkbox" id="featured_' + idx + '" style="width:auto"> مميز ⭐</label><label style="margin:0;display:flex;align-items:center;gap:6px;color:#888;font-size:0.8rem">ترتيب: <input type="number" id="sort_' + idx + '" value="' + (idx + 10) + '" style="width:55px"></label></div></div></div>';
  });
  const hasItems = items.length > 0;
  document.getElementById('actions').style.display = hasItems ? 'flex' : 'none';
  document.getElementById('dropZone').style.display = hasItems ? 'none' : 'block';
}
function removeItem(idx) { items.splice(idx, 1); renderGrid(); }
function clearAll() { items = []; renderGrid(); const l = document.getElementById('log'); l.style.display = 'none'; l.innerHTML = ''; document.getElementById('dropZone').style.display = 'block'; }
async function uploadAll() {
  let valid = true;
  items.forEach((item, idx) => { if (!document.getElementById('name_ar_' + idx).value.trim() || !document.getElementById('cat_' + idx).value || !document.getElementById('style_' + idx).value) { document.getElementById('card-' + idx).style.borderColor = '#f44336'; valid = false; } });
  if (!valid) { alert('⚠️ بعض الحقول المطلوبة فارغة (الاسم + التصنيف + الطراز)'); return; }
  const btn = document.getElementById('uploadBtn');
  btn.disabled = true; btn.textContent = '⏳ جارٍ الرفع...';
  document.getElementById('log').style.display = 'block';
  let successCount = 0;
  for (let idx = 0; idx < items.length; idx++) {
    const item = items[idx];
    const card = document.getElementById('card-' + idx);
    const overlay = document.getElementById('overlay-' + idx);
    const prog = document.getElementById('prog-' + idx);
    card.classList.add('uploading'); overlay.textContent = '⏳'; prog.style.width = '30%';
    try {
      log('info', '⬆️ رفع [' + (idx+1) + '/' + items.length + ']: ' + item.file.name);
      const cldUrl = await uploadToCloudinary(item.compressedBlob, item.file.name, prog);
      const name_ar = document.getElementById('name_ar_' + idx).value.trim();
      const name_en = document.getElementById('name_en_' + idx).value.trim();
      const category = document.getElementById('cat_' + idx).value;
      const style = document.getElementById('style_' + idx).value;
      const loc_ar = document.getElementById('loc_ar_' + idx).value.trim();
      const desc_ar = document.getElementById('desc_' + idx).value.trim();
      const featured = document.getElementById('featured_' + idx).checked;
      const sort_order = parseInt(document.getElementById('sort_' + idx).value) || idx + 10;
      log('info', '💾 حفظ: ' + name_ar);
      const { error } = await db.from('projects').insert({ name_ar, name_en: name_en || null, category, style, location_ar: loc_ar || null, description_ar: desc_ar || null, image_url: cldUrl, cloudinary_public_id: FOLDER + '/' + item.file.name.replace(/\.[^.]+$/, ''), image_alt_ar: name_ar + ' - ' + category + ' - Creative3Design', image_alt_en: (name_en || name_ar) + ' - ' + category + ' - Creative3Design', seo_title: name_ar + ' | Creative3Design', seo_description: desc_ar ? desc_ar.substring(0, 155) : name_ar + ' - Creative3Design', featured, sort_order, status: 'published' });
      if (error) throw error;
      card.classList.remove('uploading'); card.classList.add('success'); overlay.textContent = '✅'; prog.style.width = '100%';
      log('ok', '✅ تم: ' + name_ar + ' → ' + cldUrl);
      successCount++;
    } catch (err) {
      card.classList.remove('uploading'); card.classList.add('error'); overlay.textContent = '❌'; prog.style.width = '100%'; prog.style.background = '#f44336';
      log('err', '❌ فشل [' + (idx+1) + ']: ' + err.message);
    }
  }
  btn.disabled = false; btn.textContent = '⬆️ رفع الكل وحفظ في الموقع';
  if (successCount > 0) { log('ok', '🎉 اكتمل: ' + successCount + '/' + items.length + ' مشروع'); log('info', '👉 https://creative3design-cloud.vercel.app/portfolio.html'); }
}
function uploadToCloudinary(blob, filename, progEl) {
  return new Promise((resolve, reject) => {
    const fd = new FormData();
    const baseName = filename.replace(/\.[^.]+$/, '');
    fd.append('file', blob, baseName + '.webp');
    fd.append('upload_preset', UPLOAD_PRESET);
    fd.append('folder', FOLDER);
    fd.append('public_id', baseName);
    const xhr = new XMLHttpRequest();
    xhr.open('POST', 'https://api.cloudinary.com/v1_1/' + CLOUD_NAME + '/image/upload');
    xhr.upload.onprogress = e => { if (e.lengthComputable && progEl) progEl.style.width = (30 + (e.loaded / e.total) * 60) + '%'; };
    xhr.onload = () => { const data = JSON.parse(xhr.responseText); if (data.error) reject(new Error(data.error.message)); else resolve(data.secure_url); };
    xhr.onerror = () => reject(new Error('Network error'));
    xhr.send(fd);
  });
}
function formatSize(bytes) { if (bytes < 1024) return bytes + ' B'; if (bytes < 1048576) return (bytes / 1024).toFixed(0) + ' KB'; return (bytes / 1048576).toFixed(1) + ' MB'; }
function log(type, msg) { const l = document.getElementById('log'); l.style.display = 'block'; const d = document.createElement('div'); d.className = 'log-' + type; d.textContent = msg; l.appendChild(d); l.scrollTop = l.scrollHeight; }
(async () => { const { data: { session } } = await db.auth.getSession(); if (!session) { document.body.innerHTML = '<div style="text-align:center;padding:100px 20px;color:#B8976A"><h2>⚠️ يجب تسجيل الدخول أولاً</h2><p style="margin-top:12px;color:#666">اذهب إلى لوحة التحكم وسجّل دخولك</p><a href="/admin/" style="color:#B8976A;display:inline-block;margin-top:16px">← لوحة التحكم</a></div>'; } })();
</script>
</body>
</html>
