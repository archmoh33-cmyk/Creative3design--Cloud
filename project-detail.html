  <style>
    /* ── Project Detail Layout ── */
    .pd-hero {
      position: relative;
      background: var(--black-card);
      overflow: hidden;
      max-height: 520px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .pd-hero-img {
      width: 100%;
      max-height: 520px;
      object-fit: cover;
      display: block;
      transition: opacity .4s;
    }
    .pd-hero-img.loading { opacity: 0; }
    .pd-hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(12,10,8,.85) 0%, rgba(12,10,8,.1) 60%, transparent 100%);
    }
    .pd-hero-text {
      position: absolute;
      bottom: 2rem;
      right: 0;
      left: 0;
      padding: 0 2rem;
    }
    .pd-hero-text h1 {
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      font-weight: 900;
      color: #fff;
      margin: 0 0 .4rem;
      line-height: 1.2;
    }
    .pd-meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: .5rem .9rem;
      align-items: center;
    }
    .pd-badge {
      display: inline-flex;
      align-items: center;
      gap: .3rem;
      background: rgba(184,151,106,.18);
      border: 1px solid rgba(184,151,106,.35);
      color: #B8976A;
      border-radius: 20px;
      padding: .22rem .7rem;
      font-size: .76rem;
      font-weight: 700;
      letter-spacing: .04em;
    }
    .pd-loc {
      font-size: .82rem;
      color: rgba(232,228,220,.65);
    }

    /* ── Spinner overlay on hero ── */
    .pd-hero-spinner {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--black-card);
    }
    .pd-hero-spinner svg { animation: pdSpin .9s linear infinite; opacity: .4; }
    @keyframes pdSpin { to { transform: rotate(360deg); } }

    /* ── Gallery thumbnails ── */
    .pd-gallery-section {
      padding: 2rem 0 1rem;
    }
    .pd-gallery-label {
      font-size: .78rem;
      color: var(--text-muted);
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      margin-bottom: .8rem;
    }
    .pd-thumbs {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
      gap: .5rem;
    }
    .pd-thumb-item {
      aspect-ratio: 4/3;
      overflow: hidden;
      border-radius: 4px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: border-color .2s, transform .15s;
    }
    .pd-thumb-item:hover { border-color: rgba(184,151,106,.5); transform: scale(1.02); }
    .pd-thumb-item.active { border-color: #B8976A; }
    .pd-thumb-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* ── Info grid ── */
    .pd-info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 1rem;
      margin: 1.5rem 0;
    }
    .pd-info-card {
      background: var(--black-card);
      border: 1px solid var(--gray-border);
      border-radius: 8px;
      padding: 1rem 1.1rem;
    }
    .pd-info-label {
      font-size: .72rem;
      color: var(--text-muted);
      font-weight: 700;
      letter-spacing: .07em;
      text-transform: uppercase;
      margin-bottom: .35rem;
    }
    .pd-info-value {
      font-size: .92rem;
      color: var(--text-primary);
      font-weight: 600;
    }

    /* ── Description ── */
    .pd-desc {
      background: var(--black-card);
      border: 1px solid var(--gray-border);
      border-radius: 8px;
      padding: 1.25rem 1.4rem;
      margin: 1rem 0 2rem;
      color: var(--text-secondary);
      line-height: 1.75;
      font-size: .9rem;
    }

    /* ── Navigation between projects ── */
    .pd-nav-row {
      display: flex;
      justify-content: space-between;
      gap: 1rem;
      margin: 2rem 0 3rem;
    }
    .pd-nav-btn {
      display: flex;
      align-items: center;
      gap: .5rem;
      background: var(--black-card);
      border: 1px solid var(--gray-border);
      color: var(--text-muted);
      border-radius: 8px;
      padding: .65rem 1.1rem;
      font-size: .82rem;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: border-color .2s, color .2s;
      flex: 1;
      max-width: 260px;
    }
    .pd-nav-btn:hover { border-color: rgba(184,151,106,.45); color: #B8976A; }
    .pd-nav-btn.pd-nav-prev { justify-content: flex-end; }
    .pd-nav-btn.pd-nav-next { justify-content: flex-start; }
    .pd-nav-title {
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 160px;
    }
    .pd-nav-back {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    /* ── Error / skeleton ── */
    .pd-skeleton-hero {
      width: 100%;
      height: 400px;
      background: var(--black-card);
      position: relative;
      overflow: hidden;
    }
    .pd-skeleton-hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg,transparent 25%,rgba(184,151,106,.07) 50%,transparent 75%);
      background-size: 200% 100%;
      animation: pdShimmer 1.5s infinite;
    }
    @keyframes pdShimmer { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

    .pd-not-found {
      text-align: center;
      padding: 6rem 1rem;
      color: var(--text-muted);
    }
    .pd-not-found h2 { font-size: 1.5rem; margin-bottom: .75rem; }

    /* ── Lightbox for gallery ── */
    #pd-lb {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: rgba(8,7,6,.97);
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #pd-lb.active { display: flex; }
    .pd-lb-close {
      position: absolute;
      top: 1rem;
      right: 1rem;
      background: rgba(184,151,106,.15);
      border: 1px solid rgba(184,151,106,.3);
      color: #e8e4dc;
      border-radius: 50%;
      width: 38px;
      height: 38px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.1rem;
      z-index: 2;
      transition: background .2s;
    }
    .pd-lb-close:hover { background: rgba(224,82,82,.25); }
    .pd-lb-counter {
      position: absolute;
      top: 1.1rem;
      left: 1rem;
      font-size: .78rem;
      color: #B8976A;
      font-weight: 700;
      letter-spacing: .06em;
    }
    .pd-lb-img {
      max-width: 100%;
      max-height: 92vh;
      object-fit: contain;
      display: block;
      transition: opacity .22s;
    }
    .pd-lb-img.loading { opacity: 0; }
    .pd-lb-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(184,151,106,.15);
      border: 1px solid rgba(184,151,106,.3);
      color: #e8e4dc;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 1.6rem;
      transition: background .2s;
    }
    .pd-lb-nav:hover { background: rgba(184,151,106,.35); }
    .pd-lb-prev { right: 1rem; }
    .pd-lb-next { left: 1rem; }

    'classic':       'كلاسيك',
    'contemporary':  'كونتمبوراري',

  };

  var allProjects = [];
  var pdImages    = [];
  var pdCurrent   = 0;

  /* ── Gallery lightbox ── */
  function pdLbOpen(idx) {
    pdCurrent = idx;
    var lb  = document.getElementById('pd-lb');
    var img = document.getElementById('pd-lb-img');
    lb.classList.add('active');
    document.body.style.overflow = 'hidden';
    pdLbShow(idx);
  }
  window.pdLbClose = function() {
    document.getElementById('pd-lb').classList.remove('active');
    document.body.style.overflow = '';
  };
  window.pdLbStep = function(dir) { pdLbShow(pdCurrent + dir); };

  function pdLbShow(idx) {
    pdCurrent = Math.max(0, Math.min(idx, pdImages.length - 1));
    var img = document.getElementById('pd-lb-img');
    var ctr = document.getElementById('pd-lb-counter');
    img.classList.add('loading');
    img.src = '';
    var src = (pdImages[pdCurrent] || {}).url || '';
    if (!src) return;
    var tmp = new Image();
    tmp.onload  = function() { img.src = src; img.alt = (pdImages[pdCurrent] || {}).caption||''; img.classList.remove('loading'); };
    tmp.onerror = function() { img.classList.remove('loading'); };
    tmp.src = src;
    ctr.textContent = pdImages.length > 1 ? (pdCurrent+1) + ' / ' + pdImages.length : '';
    var show = pdImages.length > 1 ? 'flex' : 'none';
    document.getElementById('pd-lb-prev').style.display = show;
    document.getElementById('pd-lb-next').style.display = show;
    document.querySelectorAll('.pd-thumb-item').forEach(function(t,i){ t.classList.toggle('active', i === pdCurrent); });
  }

  document.addEventListener('keydown', function(e) {
    var lb = document.getElementById('pd-lb');
    if (!lb || !lb.classList.contains('active')) return;
    if (e.key === 'Escape')     pdLbClose();
    if (e.key === 'ArrowRight') window.pdLbStep(+1);
    if (e.key === 'ArrowLeft')  window.pdLbStep(-1);
  });
  document.getElementById('pd-lb').addEventListener('click', function(e) {
    if (e.target === this) window.pdLbClose();
  });

  /* ── Render project detail ── */
  function renderDetail(project, images, prevProj, nextProj) {
    pdImages = images.length ? images : [{ url: project.image_url || '', caption: project.name_ar || '' }];

    /* Update page title */
    document.title = (project.name_ar || 'تفاصيل المشروع') + ' | Creative3Design';
    var metaDesc = document.querySelector('meta[name="description"]');
    if (metaDesc) metaDesc.content = (project.name_ar || '') + ' — ' + (project.location_ar || '') + ' | Creative3Design';

    var cat   = window.c3dCategoryLabel ? c3dCategoryLabel(project.category,'ar') : (CAT_LABELS[project.category]   || project.category   || '');
    var style = window.c3dStyleLabel    ? c3dStyleLabel(project.style,'ar')       : (STYLE_LABELS[project.style]    || project.style      || '');
    var loc   = project.location_ar || '';
    var desc  = project.description_ar || project.description || '';

    /* Build thumbnail grid */
    var thumbsHTML = '';
    if (pdImages.length > 1) {
      thumbsHTML = '<div class="pd-gallery-section">' +
        '<p class="pd-gallery-label">صور المشروع (' + pdImages.length + ')</p>' +
        '<div class="pd-thumbs">' +
        pdImages.map(function(img, i) {
          return '<div class="pd-thumb-item' + (i===0?' active':'') + '" onclick="pdThumbClick(' + i + ')">' +
                 '<img src="' + img.url + '" alt="' + (img.caption||project.name_ar||'') + '" loading="lazy" />' +
                 '</div>';
        }).join('') +
        '</div></div>';
    }

    /* Build info cards */
    var infoCards = '';
    if (cat)   infoCards += '<div class="pd-info-card"><div class="pd-info-label">التصنيف</div><div class="pd-info-value">' + cat + '</div></div>';
    if (style) infoCards += '<div class="pd-info-card"><div class="pd-info-label">الستايل</div><div class="pd-info-value">' + style + '</div></div>';
    if (loc)   infoCards += '<div class="pd-info-card"><div class="pd-info-label">الموقع</div><div class="pd-info-value">' + loc + '</div></div>';
    if (project.area)  infoCards += '<div class="pd-info-card"><div class="pd-info-label">المساحة</div><div class="pd-info-value">' + project.area + ' م²</div></div>';
    if (project.year)  infoCards += '<div class="pd-info-card"><div class="pd-info-label">السنة</div><div class="pd-info-value">' + project.year + '</div></div>';

    /* Build nav buttons */
    var navHTML = '<div class="pd-nav-row">';
    if (nextProj) {
      navHTML += '<a class="pd-nav-btn pd-nav-next" href="project-detail.html?id=' + encodeURIComponent(nextProj.id) + '">' +
                 '← <span class="pd-nav-title">' + (nextProj.name_ar || 'التالي') + '</span></a>';
    } else { navHTML += '<span></span>'; }
    if (prevProj) {
      navHTML += '<a class="pd-nav-btn pd-nav-prev" href="project-detail.html?id=' + encodeURIComponent(prevProj.id) + '">' +
                 '<span class="pd-nav-title">' + (prevProj.name_ar || 'السابق') + '</span> →</a>';
    } else { navHTML += '<span></span>'; }
    navHTML += '</div>';

    var mainEl = document.getElementById('pd-main');
    mainEl.innerHTML =
      /* Hero */
      '<div class="pd-hero">' +
        '<img class="pd-hero-img" id="pd-hero-img" src="' + pdImages[0].url + '" alt="' + (project.name_ar||'') + '" onclick="pdLbOpen(0)" style="cursor:zoom-in" />' +
        '<div class="pd-hero-overlay"></div>' +
        '<div class="pd-hero-text">' +
          '<h1>' + (project.name_ar || '') + '</h1>' +
          '<div class="pd-meta-row">' +
            (cat   ? '<span class="pd-badge">' + cat + '</span>'   : '') +
            (style ? '<span class="pd-badge">' + style + '</span>' : '') +
            (loc   ? '<span class="pd-loc">📍 ' + loc + '</span>'  : '') +
          '</div>' +
        '</div>' +
      '</div>' +
      /* Content */
      '<div class="container" style="padding-top:2rem">' +
        (pdImages.length > 1 ? thumbsHTML : '') +
        (infoCards ? '<div class="pd-info-grid">' + infoCards + '</div>' : '') +
        (desc ? '<div class="pd-desc">' + desc + '</div>' : '') +
        '<div class="pd-nav-back">' +
          '<a href="portfolio.html" class="btn-outline-gold">← العودة إلى المعرض</a>' +
        '</div>' +
        navHTML +
      '</div>';

    /* Reveal lazy */
    setTimeout(function() {
      document.querySelectorAll('.lazy-reveal').forEach(function(el){ el.classList.add('revealed'); });
    }, 80);
  }

  /* Thumb click: update hero + lightbox */
  window.pdThumbClick = function(idx) {
    pdCurrent = idx;
    var heroImg = document.getElementById('pd-hero-img');
    if (heroImg) {
      heroImg.src = (pdImages[idx] || {}).url || '';
    }
    document.querySelectorAll('.pd-thumb-item').forEach(function(t,i){ t.classList.toggle('active', i === idx); });
    pdLbOpen(idx);
  };

  /* ── Init ── */
  async function init() {
    var projectId = new URLSearchParams(window.location.search).get('id');
    var mainEl    = document.getElementById('pd-main');

    if (!projectId) {
      mainEl.innerHTML = '<div class="pd-not-found container"><h2>لم يُحدد مشروع</h2><p><a href="portfolio.html" class="btn-outline-gold">← العودة للمعرض</a></p></div>';
      return;
    }

    /* Show skeleton while loading */
    mainEl.innerHTML = '<div class="pd-skeleton-hero"></div>';

    /* Fetch all projects */
    if (window.C3D_STATIC_MODE || !window.c3dClient) {
      allProjects = STATIC_PROJECTS;
    } else {
      var res = await window.c3dFetchProjects({ limit: 500 });
      allProjects = (res.error || !res.data || !res.data.length) ? STATIC_PROJECTS : res.data;
    }

    var project = allProjects.find(function(p){ return String(p.id) === String(projectId); });

    if (!project) {
      mainEl.innerHTML = '<div class="pd-not-found container">' +
        '<h2>المشروع غير موجود</h2>' +
        '<p style="color:var(--text-muted);margin-bottom:1.5rem;">ربما تم حذف المشروع أو الرابط غير صحيح</p>' +
        '<a href="portfolio.html" class="btn-outline-gold">← العودة للمعرض</a>' +
        '</div>';
      return;
    }

    /* Fetch images from Supabase */
    var images = [];
    if (window.c3dClient && !String(projectId).startsWith('s')) {
      try {
        var imgRes = await window.c3dClient
          .from('project_images')
          .select('image_url, sort_order')
          .eq('project_id', projectId)
          .order('sort_order', { ascending: true });
        if (!imgRes.error && imgRes.data && imgRes.data.length) {
          images = imgRes.data.map(function(r){ return { url: r.image_url, caption: project.name_ar || '' }; });
        }
      } catch(e) { console.warn('[C3D Detail] fetch images error:', e); }
    }

    /* Prev/Next */
    var idx  = allProjects.findIndex(function(p){ return String(p.id) === String(projectId); });
    var prev = idx > 0                        ? allProjects[idx - 1] : null;
    var next = idx < allProjects.length - 1   ? allProjects[idx + 1] : null;

    renderDetail(project, images, prev, next);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    setTimeout(init, 80);
  }

})();
</script>
<script src="js/main.js" defer></script>

<script src="wa-smart.js"></script>
</body>
