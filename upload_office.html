<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>Upload</title></head>
<body style="font-family:sans-serif;padding:2rem;">
<h2>Upload to Cloudinary</h2>
<input type="file" id="fileInput" accept="image/*"><br><br>
<button onclick="doUpload()">Upload</button>
<pre id="result" style="background:#f0f0f0;padding:1rem;margin-top:1rem;"></pre>
<script>
async function doUpload() {
  const file = document.getElementById('fileInput').files[0];
  if (!file) { alert('Pick a file first'); return; }
  document.getElementById('result').textContent = 'Uploading...';
  const fd = new FormData();
  fd.append('file', file);
  fd.append('upload_preset', 'creative3design');
  try {
    const res = await fetch('https://api.cloudinary.com/v1_1/dwh2y3lvz/image/upload', {
      method: 'POST', body: fd
    });
    const data = await res.json();
    document.getElementById('result').textContent = JSON.stringify(data, null, 2);
    if (data.secure_url) {
      document.getElementById('result').textContent = 'SUCCESS URL:\n' + data.secure_url + '\n\n' + JSON.stringify(data, null, 2);
    }
  } catch(e) {
    document.getElementById('result').textContent = 'Error: ' + e.message;
  }
}
</script>
</body>
</html>
